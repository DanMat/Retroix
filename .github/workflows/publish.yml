name: Publish to npm

# Publishes the package to the npm registry. Runs when:
#   • a v* tag is pushed by hand (e.g. `npm version patch && git push --follow-tags`)
#   • the "Release" workflow calls it after bumping the version
#   • you trigger it manually from the Actions tab (used for the first publish)
on:
  push:
    tags:
      - 'v*'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (public repo)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Sanity check (module loads)
        run: npm test

      # --provenance signs the package with a verifiable link back to this repo
      # and commit. If your token type ever rejects it, drop the flag.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
