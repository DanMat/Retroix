name: Release

# One-click release. From the Actions tab, run this and pick patch / minor / major.
# It bumps the version in package.json, commits, creates the matching vX.Y.Z tag,
# pushes both, and then publishes to npm. jsDelivr picks up the new tag instantly.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # `npm version` edits package.json, makes the commit, and tags it vX.Y.Z.
      - name: Bump version and tag
        run: npm version ${{ inputs.bump }} -m "chore: release v%s"

      - name: Push commit and tag
        run: git push --follow-tags

  # A tag pushed by GITHUB_TOKEN above will NOT trigger publish.yml's tag event
  # (Actions won't recurse into itself), so we call the publish workflow directly.
  publish:
    needs: version
    uses: ./.github/workflows/publish.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
