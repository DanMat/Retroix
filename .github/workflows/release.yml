name: Release

# One-click release. From the Actions tab, run this and pick patch / minor / major.
# It bumps the version in package.json, commits, tags vX.Y.Z, pushes, and then
# publishes to npm — all in one job. jsDelivr picks up the new tag instantly.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump'
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write # push the version commit + tag
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # `npm version` edits package.json, makes the commit, and tags it vX.Y.Z.
      - name: Bump version and tag
        run: npm version ${{ inputs.bump }} -m "chore: release v%s"

      - name: Push commit and tag
        run: git push --follow-tags

      - name: Sanity check (module loads)
        run: npm test

      # Publish the freshly-bumped checkout. Done inline (rather than by calling
      # publish.yml) so the whole release is one self-contained job.
      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
